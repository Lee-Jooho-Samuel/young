<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>청년 소그룹 성경공부</title>
    <!-- Tailwind CSS (디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel (JSX 변환) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Phosphor Icons (아이콘) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <style>
        body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Segoe UI', 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif; background-color: #f3f4f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            const [answers, setAnswers] = React.useState({
                q1: '',
                q2: '',
                reflection: '',
                action: null
            });

            // 리더의 정리 숨기기/보이기 상태 관리
            const [showSummary, setShowSummary] = React.useState({
                q1: false,
                q2: false
            });

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setAnswers(prev => ({ ...prev, [name]: value }));
                // textarea 자동 높이 조절
                e.target.style.height = 'inherit';
                e.target.style.height = `${e.target.scrollHeight}px`;
            };

            const toggleSummary = (q) => {
                setShowSummary(prev => ({ ...prev, [q]: !prev[q] }));
            };

            const handleActionSelect = (index) => {
                setAnswers(prev => ({ ...prev, action: index }));
            };

            const copyToClipboard = () => {
                const actionTexts = [
                    "먼지 쌓인 성경책 열기를 실천하겠습니다! (5분 말씀 읽기)",
                    "찔리는 말씀 피하지 않기를 실천하겠습니다! (말씀 메모하고 고민하기)",
                    "'말씀 거울' 일기 쓰기를 실천하겠습니다! (말씀 읽고 회개/감사 일기 쓰기)"
                ];

                if (answers.action === null) {
                    alert("이번 주 액션 플랜을 먼저 하나 선택해주세요!");
                    return;
                }

                const textToCopy = `[나의 소그룹 결단 🙏]\n이번 주 저는 "${actionTexts[answers.action]}"\n기도로 응원해 주세요!`;
                
                // textarea를 이용한 클립보드 복사
                const textarea = document.createElement("textarea");
                textarea.value = textToCopy;
                textarea.style.position = "fixed";
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                try {
                    document.execCommand("copy");
                    alert("나의 결단이 복사되었습니다! 카톡방에 붙여넣기(Paste) 해주세요.");
                } catch (err) {
                    alert("복사에 실패했습니다. 직접 타이핑해주세요.");
                }
                document.body.removeChild(textarea);
            };

            return (
                <div className="max-w-md mx-auto bg-gray-50 min-h-screen pb-20 shadow-xl sm:rounded-2xl sm:my-8 overflow-hidden">
                    {/* Header */}
                    <div className="bg-blue-600 text-white p-6 rounded-b-3xl shadow-md">
                        <div className="text-blue-200 text-sm font-semibold tracking-wider mb-1 flex items-center">
                            <i className="ph ph-book-open-text text-lg mr-2"></i> 청년 소그룹 성경공부
                        </div>
                        <h1 className="text-2xl font-bold leading-tight mb-3">성경의 역할:<br/>내 삶을 해부하는 살아있는 말씀</h1>
                        <div className="bg-white/20 p-3 rounded-lg text-sm leading-relaxed backdrop-blur-sm">
                            <span className="font-bold text-yellow-300">기억절:</span> "하나님의 말씀은 살아 있고 활력이 있어 좌우에 날선 어떤 검보다도 예리하여 혼과 영과 및 관절과 골수를 찔러 쪼개기까지 하며 또 마음의 생각과 뜻을 판단하나니" (히브리서 4:12)
                        </div>
                    </div>

                    <div className="p-5 space-y-6">
                        
                        {/* Section 1 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                            <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center">
                                <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">1</span> 마음 열기
                            </h2>
                            <p className="text-gray-700 font-medium mb-3">🗣️ "요즘 흔히 말하는 '팩트 폭력'이나 '뼈 때리는 조언'을 듣고 정신이 번쩍 들었던 경험이 있나요?"</p>
                            <div className="bg-gray-50 border-l-4 border-blue-400 p-3 text-sm text-gray-600 italic rounded-r-lg">
                                오늘 본문에서 히브리서 기자는 하나님의 말씀이 단순한 위로를 넘어, 우리 마음속 깊은 곳을 찌르는 예리한 '칼'과 같다고 이야기합니다.
                            </div>
                        </section>

                        {/* Section 2 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 space-y-6">
                            <h2 className="text-lg font-bold text-gray-800 flex items-center">
                                <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">2</span> 말씀 발견
                            </h2>
                            
                            {/* Question 1 */}
                            <div>
                                <p className="font-semibold text-gray-800 mb-2 leading-snug">Q1. 히브리서 4:12을 읽어봅시다. 여기서 하나님의 말씀을 무엇에 비유하고 있나요? 왜 하필 그 무기였을까요?</p>
                                <div className="bg-gray-50 border-l-4 border-blue-400 p-3 mb-3 text-[13px] text-gray-600 rounded-r-lg font-serif leading-relaxed">
                                    "하나님의 말씀은 살아 있고 활력이 있어 좌우에 날선 어떤 검보다도 예리하여 혼과 영과 및 관절과 골수를 찔러 쪼개기까지 하며 또 마음의 생각과 뜻을 판단하나니" (히브리서 4:12)
                                </div>
                                <textarea 
                                    name="q1" 
                                    value={answers.q1} 
                                    onChange={handleInputChange}
                                    placeholder="여기를 터치해서 나의 발견을 적어보세요..."
                                    className="w-full bg-gray-50 text-gray-700 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none overflow-hidden min-h-[80px] mb-2"
                                />
                                <button 
                                    onClick={() => toggleSummary('q1')}
                                    className="text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors flex items-center"
                                >
                                    <i className={`ph ${showSummary.q1 ? 'ph-caret-up' : 'ph-lightbulb'} mr-1.5`}></i>
                                    {showSummary.q1 ? "리더의 정리 숨기기" : "리더의 정리 보기"}
                                </button>
                                
                                {/* Q1 Leader's Summary */}
                                {showSummary.q1 && (
                                    <div className="fade-in mt-3 bg-blue-50 border border-blue-100 p-4 rounded-xl text-sm text-gray-700 leading-relaxed shadow-sm">
                                        <p className="font-bold text-blue-800 mb-1">💡 리더의 정리</p>
                                        당시 로마 군단병들이 쓰던 짧고 양쪽에 날이 선 검은 적의 갑옷 틈새를 파고들어 찌르는 치명적인 무기였습니다. 의사의 수술용 칼이 환자의 병든 부위를 갈라내듯, 살아있는 말씀은 우리가 스스로도 모르는 내면의 숨은 동기와 거짓된 핑계들을 날카롭게 해부하여 드러냅니다.
                                    </div>
                                )}
                            </div>

                            <hr className="border-gray-100" />

                            {/* Question 2 */}
                            <div>
                                <p className="font-semibold text-gray-800 mb-2 leading-snug">Q2. 내면을 찔러 쪼개는 성경의 궁극적인 목적, 유익은 무엇일까요? (디모데후서 3:16-17)</p>
                                <div className="bg-gray-50 border-l-4 border-blue-400 p-3 mb-3 text-[13px] text-gray-600 rounded-r-lg font-serif leading-relaxed space-y-1">
                                    <p>"모든 성경은 하나님의 감동으로 된 것으로 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니"</p>
                                    <p>"이는 하나님의 사람으로 온전하게 하며 모든 선한 일을 행할 능력을 갖추게 하려 함이라" (디모데후서 3:16-17)</p>
                                </div>
                                <textarea 
                                    name="q2" 
                                    value={answers.q2} 
                                    onChange={handleInputChange}
                                    placeholder="모든 성경은 교훈과 책망과 바르게 함과..."
                                    className="w-full bg-gray-50 text-gray-700 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none overflow-hidden min-h-[80px] mb-2"
                                />
                                <button 
                                    onClick={() => toggleSummary('q2')}
                                    className="text-sm font-semibold text-blue-600 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-lg transition-colors flex items-center"
                                >
                                    <i className={`ph ${showSummary.q2 ? 'ph-caret-up' : 'ph-lightbulb'} mr-1.5`}></i>
                                    {showSummary.q2 ? "리더의 정리 숨기기" : "리더의 정리 보기"}
                                </button>
                                
                                {/* Q2 Leader's Summary */}
                                {showSummary.q2 && (
                                    <div className="fade-in mt-3 bg-blue-50 border border-blue-100 p-4 rounded-xl text-sm text-gray-700 leading-relaxed shadow-sm">
                                        <p className="font-bold text-blue-800 mb-1">💡 리더의 정리</p>
                                        바울은 "모든 성경은 교훈과 책망과 바르게 함과 의로 교육하기에 유익하니"(딤후 3:16)라고 말합니다. 성경은 단순히 내 마음을 편안하게 해주는 수면제가 아니라, 잘못된 길에서 돌이켜 바르게 살아가도록 돕는 '치료제'입니다.
                                    </div>
                                )}
                            </div>
                        </section>

                        {/* Section 3 */}
                        <section className="bg-indigo-50 p-5 rounded-2xl border border-indigo-100">
                            <h2 className="text-lg font-bold text-indigo-800 mb-3 flex items-center">
                                <span className="bg-indigo-200 text-indigo-700 w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">3</span> 은혜의 수술대 (복음)
                            </h2>
                            <p className="text-sm text-gray-700 leading-relaxed space-y-2">
                                <span className="block mb-2">말씀의 기준은 너무나 높고 완전해서, 내 힘으로는 도저히 이룰 수 없음을 처절하게 깨닫습니다. 하지만 성경은 우리를 절망에 빠뜨리고 끝나지 않습니다.</span>
                                <span className="block mb-2 font-semibold text-indigo-900">우리가 마땅히 받아야 할 심판의 칼날을, 예수님께서 십자가에서 대신 맞으셨습니다.</span>
                                <span className="block">그리스도께서 먼저 심판의 검을 감당하셨기에, 우리는 두려움 없이 기꺼이 '말씀의 수술대' 위에 나를 눕힐 수 있습니다.</span>
                            </p>
                        </section>

                        {/* Section 4 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                            <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center">
                                <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">4</span> 깊은 나눔
                            </h2>
                            <p className="text-sm text-gray-600 mb-4 leading-relaxed">
                                오늘날 우리는 위로의 말씀만 골라 SNS에 올립니다. 반면 직장에서 요령을 피울 때, 카톡방에서 뒷담화할 때 찔러오는 말씀은 <span className="font-bold text-red-500 bg-red-50 px-1">'읽씹'</span> 해버리기 일쑤입니다.
                            </p>
                            <div className="bg-orange-50 p-4 rounded-xl mb-4 border border-orange-100">
                                <p className="font-bold text-orange-800 text-sm mb-2">🗣️ 나눔 질문</p>
                                <p className="text-orange-900 text-sm leading-snug">최근 설교나 성경을 읽으며 유독 나를 불편하게 하거나 '뼈를 때리듯 찔리게' 했던 말씀이 있었나요? 혹은 너무 찔려서 의도적으로 모른 척 외면했던 경험을 솔직하게 나눠봅시다.</p>
                            </div>
                            <textarea 
                                name="reflection" 
                                value={answers.reflection} 
                                onChange={handleInputChange}
                                placeholder="나눔 전, 나의 생각과 경험을 미리 적어보세요."
                                className="w-full bg-gray-50 text-gray-700 border border-gray-200 rounded-xl p-3 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all resize-none overflow-hidden min-h-[100px]"
                            />
                        </section>

                        {/* Section 5 */}
                        <section className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                            <h2 className="text-lg font-bold text-gray-800 mb-3 flex items-center">
                                <span className="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-sm mr-2">5</span> 액션 플랜
                            </h2>
                            <p className="text-sm text-gray-600 mb-4">이번 주 나의 삶의 결단을 하나 선택해 주세요.</p>
                            
                            <div className="space-y-3">
                                {[
                                    { title: "먼지 쌓인 성경책 열기", desc: "이번 주 하루, 5분만 시편 23편 3번 읽기", badge: "초급" },
                                    { title: "찔리는 말씀 피하지하기", desc: "안식일 설교 중 찔리는 말씀 메모하고 고민하기", badge: "중급" },
                                    { title: "'말씀 거울' 일기 쓰기", desc: "매일 10분 복음서 읽고 회개/감사 일기 쓰기", badge: "도전" }
                                ].map((item, index) => (
                                    <div 
                                        key={index}
                                        onClick={() => handleActionSelect(index)}
                                        className={`p-4 rounded-xl border-2 cursor-pointer transition-all flex items-start ${answers.action === index ? 'border-blue-500 bg-blue-50' : 'border-gray-100 bg-white hover:border-blue-200'}`}
                                    >
                                        <div className={`mt-0.5 w-5 h-5 rounded-full border flex-shrink-0 flex items-center justify-center mr-3 ${answers.action === index ? 'border-blue-500 bg-blue-500' : 'border-gray-300'}`}>
                                            {answers.action === index && <i className="ph ph-check text-white text-sm"></i>}
                                        </div>
                                        <div>
                                            <div className="flex items-center mb-1">
                                                <span className="font-bold text-gray-800">{item.title}</span>
                                                <span className="ml-2 text-[10px] font-bold px-2 py-0.5 rounded-full bg-gray-200 text-gray-600">{item.badge}</span>
                                            </div>
                                            <p className="text-xs text-gray-500">{item.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                    </div>

                    {/* Footer Floating Button */}
                    <div className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-gray-50 via-gray-50 to-transparent">
                        <button 
                            onClick={copyToClipboard}
                            className="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-4 rounded-2xl shadow-lg transition-transform transform active:scale-95 flex items-center justify-center"
                        >
                            <i className="ph ph-share-network text-xl mr-2"></i>
                            카톡방에 나의 결단 공유하기
                        </button>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
